<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Snake</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="game-shell">
    <h1>贪吃蛇 (Snake)</h1>

      <canvas id="game" width="400" height="400"></canvas>
      <div class="game-info">

  </div>
  <script src="snake.js"></script>
